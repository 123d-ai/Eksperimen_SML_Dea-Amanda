name: Automated Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run Preprocessing Script
        run: |
          python preprocessing/automate_Dea-Amanda.py

      - name: Commit and Push Clean Dataset
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add credit_scoring_preprocessing/data_clean.csv
          
          if git diff --staged --quiet; then
            echo "Tidak ada data baru untuk dicommit."
          else
            git commit -m "chore: update preprocessed dataset secara otomatis via GitHub Actions [skip ci]"
            git push origin main
          fi
